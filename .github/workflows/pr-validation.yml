name: PR Validation

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
    - name: Syntax check
      run: |
        find . -name '*.py' -not -path './.git/*' -not -path './frameworks/*' \
          -exec python3 -m py_compile {} + 2>/dev/null && echo 'Syntax OK' || echo 'Minor issues (non-blocking)'
    - name: Workflow YAML check
      run: |
        pip install pyyaml -q 2>/dev/null || true
        find .github/workflows -name '*.yml' -exec python3 -c \
          "import yaml,sys; [yaml.safe_load(open(f)) for f in sys.argv[1:]]" {} + \
          2>/dev/null && echo 'Workflows valid' || echo 'Workflow issue detected'
    - name: Done
      run: echo 'PR validation complete'
