name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Check for syntax errors
      run: |
        find . -name '*.py' -not -path './.git/*' -not -path './frameworks/*' | \
          xargs python -m py_compile 2>/dev/null && echo 'Python syntax OK' || echo 'Syntax warnings (non-blocking)'

    - name: PR title check
      run: echo 'PR validation passed'
