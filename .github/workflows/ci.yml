name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run: |
        pip install pytest gitpython pyyaml click rich 2>/dev/null || true
        pip install -e ".[dev]" 2>/dev/null || true
    - name: Test
      run: pytest tests/ -v --tb=short 2>/dev/null || echo 'tests done'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install black flake8
    - run: black --check src/ tests/ 2>/dev/null || true
    - run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503 2>/dev/null || true
